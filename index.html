<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextEra Login</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:#111a33;
padding:25px;
border-radius:12px;
width:320px;
}

input, select{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>NextEra Login</h2>

<input id="name" type="text" placeholder="Full Name">
<input id="email" type="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<select id="role">
<option value="client">Client</option>
<option value="freelancer">Freelancer</option>
<option value="team_leader">Team Leader</option>
</select>

<input id="contact" type="text" placeholder="Contact Number">
<input id="native" type="text" placeholder="Native (yes/no)">

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>

<script>
const client = supabase.createClient(
  "https://jnmjvjutyeruoowyrfgg.supabase.co",
  "sb_publishable_VcImT89uqQK1JnyJn1Xdug_9Uoa7I_f"
);

/* SIGNUP */
async function signup(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;
const name = document.getElementById("name").value;
const role = document.getElementById("role").value;
const contact = document.getElementById("contact").value;
const native = document.getElementById("native").value;

const { data, error } = await client.auth.signUp({
email,
password
});

if(error){
alert(error.message);
return;
}

await client.from("profiles").insert([{
id: data.user.id,
email,
name,
role,
contact_number: contact,
native_status: native
}]);

alert("Signup successful!");
}

/* LOGIN */
async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data, error } = await client.auth.signInWithPassword({
email,
password
});

if(error){
alert(error.message);
return;
}

const { data: profile } = await client
.from("profiles")
.select("*")
.eq("id", data.user.id)
.single();

if(!profile){
alert("Profile not found");
return;
}

if(profile.role === "admin"){
window.location.href = "admin.html";
}
else{
window.location.href = "dashboard.html";
}
}
</script>

</body>
</html>
