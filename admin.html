<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NextEra Admin Panel - Level 12</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
padding:15px;
background:#111a33;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.box{
background:#111a33;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#38bdf8;
color:black;
font-weight:bold;
margin-top:5px;
}

button:hover{
background:#22c55e;
}
</style>
</head>

<body>

<header>
<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="container">

<!-- CREATE PROJECT -->
<h3>➕ Create New Project</h3>
<div class="box">
<input id="title" placeholder="Project Title">
<input id="description" placeholder="Project Description">
<input id="budget" placeholder="Budget">

<button onclick="createProject()">Post Project</button>
</div>

<!-- PROJECTS -->
<h3>📌 Projects</h3>
<div id="projects"></div>

<!-- INTERESTS -->
<h3>🔥 Interests</h3>
<div id="interests"></div>

</div>

<script>
const client = supabase.createClient(
"https://jnmjvjutyeruoowyrfgg.supabase.co",
"sb_publishable_VcImT89uqQK1JnyJn1Xdug_9Uoa7I_f"
);

// LOAD EVERYTHING
async function load(){
loadProjects();
loadInterests();
}

// CREATE PROJECT
async function createProject(){

let title = document.getElementById("title").value;
let description = document.getElementById("description").value;
let budget = document.getElementById("budget").value;

const { error } = await client
.from("projects")
.insert([{ title, description, budget }]);

if(error){
alert(error.message);
} else {
alert("Project Created!");
load();
}
}

// LOAD PROJECTS
async function loadProjects(){

const { data } = await client.from("projects").select("*");

let box = document.getElementById("projects");
box.innerHTML = "";

data.forEach(p => {

let div = document.createElement("div");
div.className = "box";

div.innerHTML = `
<h4>${p.title}</h4>
<p>${p.description}</p>
<p><b>Budget:</b> ${p.budget}</p>

<button onclick="deleteProject('${p.id}')">Delete</button>
`;

box.appendChild(div);
});
}

// DELETE PROJECT
async function deleteProject(id){

const { error } = await client
.from("projects")
.delete()
.eq("id", id);

if(error){
alert(error.message);
} else {
alert("Deleted!");
load();
}
}

// LOAD INTERESTS
async function loadInterests(){

const { data } = await client.from("interests").select("*");

let box = document.getElementById("interests");
box.innerHTML = "";

data.forEach(i => {

let div = document.createElement("div");
div.className = "box";

div.innerHTML = `
<p><b>Email:</b> ${i.user_email}</p>
<p><b>Role:</b> ${i.role}</p>
<p><b>Project ID:</b> ${i.project_id}</p>

<button onclick="assignWork('${i.project_id}','${i.user_id}','${i.role}')">
Assign Work
</button>
`;

box.appendChild(div);
});
}

// ASSIGN WORK
async function assignWork(project_id, user_id, role){

const { error } = await client
.from("assignments")
.insert([{
project_id,
assigned_to: user_id,
assigned_role: role,
status: "active"
}]);

if(error){
alert(error.message);
} else {
alert("Work Assigned!");
}
}

// LOGOUT
async function logout(){
await client.auth.signOut();
window.location.href = "index.html";
}

load();
</script>

</body>
</html>
